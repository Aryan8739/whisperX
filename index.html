<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Campus Whisper</title>
</head>
<body>

  <h2>Campus Whisper (Prototype)</h2>

  <textarea id="whisperInput" placeholder="Say something..." rows="2" cols="60"></textarea>
  <br />
  <button id="postButton">Post</button>

  <h3>Recent Posts</h3>
  <div id="posts"></div>

  <!-- Nickname Modal -->
  <div id="nicknameModal" style="
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.4);
  ">
    <div style="background:#fff;padding:20px;border-radius:8px;">
      <h4>Choose a nickname</h4>
      <input id="nicknameInput" placeholder="e.g. ShadowCat" />
      <button id="saveNicknameBtn">Save</button>
    </div>
  </div>

  <!-- Single module script that wires everything -->
  <script type="module">
    import { supabase } from "./supabase.js";
    window.supabase = supabase;

    import { initApp, postWhisper, saveNickname } from "./app.js";

    // make functions visible to HTML if needed later
    window.postWhisper = postWhisper;
    window.saveNickname = saveNickname;

    document.getElementById("postButton").onclick = postWhisper;
    document.getElementById("saveNicknameBtn").onclick = saveNickname;

    // start the app
    initApp();
  </script>
</body>
</html>
