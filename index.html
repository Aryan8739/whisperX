<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Campus Whisper</title>
</head>
<body>

  <h1>Campus Whisper (Prototype)</h1>

  <textarea id="whisperBox" placeholder="Say something..." rows="3" cols="40"></textarea>
  <br>
  <button id="postButton">Post</button>

  <h2>Recent Posts</h2>
  <div id="feed"></div>

  <!-- Correct module loading order -->
  <script type="module">
    // 1. Load Supabase client
    import { supabase } from "./supabase.js";
    window.supabase = supabase;

    // 2. Load app.js AFTER supabase exists
    import { postWhisper, initApp } from "./app.js";

    // 3. Attach click listener
    document.getElementById("postButton").onclick = postWhisper;

    // 4. Start the app
    initApp();
  </script>

</body>
</html>
